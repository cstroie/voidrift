name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {goos: linux,   goarch: amd64, cgo: '0'}
          - {goos: linux,   goarch: arm64, cgo: '0'}
          - {goos: darwin,  goarch: amd64, cgo: '0'}
          - {goos: darwin,  goarch: arm64, cgo: '0'}
          - {goos: windows, goarch: amd64, cgo: '0'}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -ldflags "-X main.version=${GITHUB_REF_NAME}" \
            -o voidrift-${GOOS}-${GOARCH}${EXT} \
            ./cmd/voidrift
          go build -ldflags "-X main.version=${GITHUB_REF_NAME}" \
            -o drifter-${GOOS}-${GOARCH}${EXT} \
            ./cmd/drifter

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            voidrift-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
            drifter-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
